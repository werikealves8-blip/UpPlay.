<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upplay</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background: url('imagens/fundo.png') no-repeat center center fixed;
            background-size: cover; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Centraliza tudo na tela */
            color: white;
        }

        .container {
            display: flex;
            flex-direction: column; /* Coloca um em cima do outro no celular */
            gap: 15px;
            padding: 10px;
            width: 90%;
            max-width: 300px; /* Limita a largura para ficar compacto */
            align-items: center;
        }

        .card {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            width: 100%;
        }

        .card img { 
            width: 80%; 
            max-height: 80px;
            object-fit: contain; 
            margin-bottom: 10px;
        }
        
        .btn {
            display: block;
            background: #e50914;
            color: white;
            padding: 10px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }

        .btn-suporte {
            background: #0088cc;
            color: white;
            padding: 8px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 20px;
            border: 1px solid white;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <img src="imagens/filme.png" alt="Filmes">
            <a href="https://app.pushinpay.com.br/service/pay/A237E96B-F58D-4ADF-913B-C5BB946368AB" class="btn">FILMES</a>
        </div>

        <div class="card">
            <img src="imagens/series.png" alt="Séries">
            <a href="https://app.pushinpay.com.br/service/pay/a237eb84-0271-4189-b5bd-7f564e7fa2d0" class="btn">SÉRIES</a>
        </div>

        <a href="https://t.me/leep_benques" class="btn-suporte">SUPORTE</a>
    </div>

</body>
</html>
