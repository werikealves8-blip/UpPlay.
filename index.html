<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upplay</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background: url('imagens/fundo.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end; /* Empurra os cards para baixo da tela */
            color: white;
            padding-bottom: 80px; /* Espaço extra na parte inferior */
        }

        .container {
            display: flex;
            flex-direction: row; /* Lado a lado no PC */
            gap: 40px;
            padding: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            width: 250px;
        }
        .card img { width: 100%; border-radius: 10px; }
        
        .btn {
            display: block;
            background: #e50914;
            color: white;
            padding: 12px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 15px;
            font-weight: bold;
            font-size: 16px;
        }
        .btn:hover { background: #ff0a16; }

        /* Responsividade para celular */
        @media (max-width: 600px) {
            .container { flex-direction: column; align-items: center; }
            .card { width: 80%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <img src="imagens/filme.png" alt="Filmes">
            <h3>Filmes</h3>
            <a href="https://app.pushinpay.com.br/service/pay/A237E96B-F58D-4ADF-913B-C5BB946368AB" class="btn">ENTRAR</a>
        </div>

        <div class="card">
            <img src="imagens/series.png" alt="Séries">
            <h3>Séries</h3>
            <a href="https://app.pushinpay.com.br/service/pay/a237eb84-0271-4189-b5bd-7f564e7fa2d0" class="btn">ENTRAR</a>
        </div>
    </div>

</body>
</html>
