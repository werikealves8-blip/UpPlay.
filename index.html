    <title>Upplay</title>
    <style>
        body {

            background: url('imagens/fundo.png') no-repeat center center fixed;

            min-height: 100vh;
            display: flex;

            padding: 20px;

            background: rgba(0, 0, 0, 0.7);

            text-align: center;
            width: 200px;
        }

        .card img { 
            width: 100%; 
            height: 100px;
            object-fit: contain; 
            border-radius: 10px; 
        }
        
        .btn {
            display: block;
            background: #e50914;
            color: white;

            border-radius: 5px;
            margin-top: 10px;
            font-weight: bold;
        }

        .btn-suporte {
            display: block;
            background: #0088cc;
            color: white;
            padding: 8px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin: 20px auto;
            width: fit-content;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
