<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upplay</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background: url('imagens/fundo.png') no-repeat center center fixed;
            background-size: cover; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .container {
            display: flex;
            gap: 20px;
            padding: 20px;
            flex-wrap: wrap;
            justify-content: center;
            width: 90%;
            max-width: 600px;
        }

        .card {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            flex: 1;
            min-width: 200px;
        }

        .card img { 
            width: 100%; 
            max-height: 100px;
            object-fit: contain; 
            border-radius: 10px; 
        }
        
        /* Botão padrão (Entrar) */
        .btn {
            display: block;
            background: #e50914;
            color: white;
            padding: 10px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 10px;
            font-weight: bold;
        }

            text-decoration: none;
            border-radius: 5px;
            margin-top: 15px;
            font-weight: bold;
            border: 2px solid white; /* Borda branca para destacar */
