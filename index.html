<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upplay</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background: url('imagens/fundo.png') no-repeat center center fixed;
            background-size: cover; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .container {
            display: flex;
            flex-direction: row;
            gap: 20px;
            padding: 20px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }

        .card {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            width: 200px;
        }

        .card img { 
            width: 100%; 
            height: 100px;
            object-fit: contain; 
            border-radius: 10px; 
        }
        
        .btn {
            display: block;
            background: #e50914;
            color: white;
            padding: 10px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 10px;
            font-weight: bold;
        }

        /* Botão Suporte */
        .btn-suporte {
            display: block;
            background: #0088cc;
            color: white;
            padding: 8px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin: 20px auto; /* Centraliza automaticamente */
            width: fit-content;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <img src="imagens/fundo.png" alt="Filmes">
            <a href="https://app.pushinpay.com.br/service/pay/A237E96B-F58D-4ADF-913B-C5BB946368AB" class="btn">ENTRAR</a>
        </div>

        <div class="card">
            <img src="imagens/fundo.png" alt="Séries">
            <a href="https://app.pushinpay.com.br/service/pay/a237eb84-0271-4189-b5bd-7f564e7fa2d0" class="btn">ENTRAR</a>
        </div>
    </div>

    <!-- Botão de suporte fora do container, logo abaixo -->
    <a href="https://t.me/leep_benques" class="btn-suporte">SUPORTE</a>

</body>
</html>
